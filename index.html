<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>AI Upscaler</title>  
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen flex items-center justify-center p-4">

    <div class="bg-slate-900 border border-slate-800 p-8 rounded-3xl shadow-2xl w-full max-w-2xl text-center">
        <header class="mb-10 text-center">
            <h1 class="text-4xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-cyan-400 inline-block uppercase tracking-tighter">
                AI Image Upscaler
            </h1>
            <p class="text-slate-500 mt-2 font-medium tracking-wide text-center">Powered by Real-ESRGAN & Edit by Biyann</p>
        </header>

        <div class="space-y-6 text-left">
            <div>
                <label class="block text-xs font-black text-slate-500 mb-2 uppercase tracking-widest">Unggah Gambar</label>
                <input type="file" id="imageInput" accept="image/*" 
                    class="block w-full text-sm text-slate-400 file:mr-4 file:py-3 file:px-6 file:rounded-xl file:border-0 file:text-sm file:font-bold file:bg-blue-600 file:text-white hover:file:bg-blue-500 cursor-pointer bg-slate-800 rounded-xl p-1">
            </div>

            <div>
            <label class="block text-xs font-black text-slate-500 mb-2 uppercase tracking-widest">Pilih Resolusi</label>
                <select id="scaleInput" class="w-full bg-slate-800 border border-slate-700 text-white text-sm rounded-xl p-3 outline-none">
                <option value="2">2x</option>
                <option value="3">3x</option>
                <option value="4" selected>4x</option>
                </select>       
           </div>

            <button onclick="processImage()" id="btn" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-4 rounded-2xl transition-all shadow-lg shadow-blue-900/20 active:scale-[0.98] disabled:opacity-50 mt-4 uppercase tracking-widest text-sm">
                Mulai Upscale
            </button>

            <div id="status" class="hidden py-6 text-center">
                <div class="inline-block animate-spin w-8 h-8 border-4 border-blue-500 border-t-transparent rounded-full mb-3"></div>
                <p class="text-blue-400 font-bold animate-pulse text-sm">GPU SEDANG BEKERJA...</p>
            </div>

            <div id="result" class="hidden space-y-4 pt-8 border-t border-slate-800 text-center">
                <p class="text-emerald-400 font-black text-sm uppercase tracking-widest mb-4">Proses Selesai</p>
                <img id="outputImg" class="rounded-2xl border border-slate-700 w-full shadow-2xl mb-6">
                <a id="downloadBtn" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white py-4 rounded-xl font-black flex items-center justify-center transition uppercase tracking-widest text-sm shadow-lg shadow-emerald-900/20">
                    Unduh Gambar
                </a>
            </div>
        </div>
    </div>

    <script>
        async function processImage() {
            const fileInput = document.getElementById('imageInput');
            const scale = document.getElementById('scaleInput').value;
            const btn = document.getElementById('btn');
            const status = document.getElementById('status');
            const result = document.getElementById('result');

            if (!fileInput.files[0]) return alert("Pilih fotonya dulu!");

            status.classList.remove('hidden');
            result.classList.add('hidden');
            btn.disabled = true;

            const formData = new FormData();
            formData.append('file', fileInput.files[0]);
            formData.append('scale', scale);

            try {
                const response = await fetch('http://localhost:8000/upscale', {
                    method: 'POST',
                    body: formData
                });

                const blob = await response.blob();
                const url = URL.createObjectURL(blob);

                document.getElementById('outputImg').src = url;
                document.getElementById('downloadBtn').href = url;
                document.getElementById('downloadBtn').download = `upscaled_${scale}x_${fileInput.files[0].name}`;

                result.classList.remove('hidden');
                result.scrollIntoView({ behavior: 'smooth' });
            } catch (err) {
                alert("Server Error! Pastikan Uvicorn sudah jalan di terminal.");
            } finally {
                status.classList.add('hidden');
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
